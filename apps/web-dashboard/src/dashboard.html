<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Recall — Skill Dashboard</title>
    <style>
      body {
        font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f1115;
        color: #e6e6e6;
        max-width: 720px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      h1 {
        font-size: 1.25rem;
      }
      #meta {
        color: #9aa0a6;
        margin-bottom: 1rem;
      }
      .bar-row {
        display: grid;
        grid-template-columns: 220px 1fr;
        align-items: center;
        gap: 0.75rem;
        margin: 0.35rem 0;
      }
      .bar-label {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .bar-track {
        background: #1e2128;
        border-radius: 3px;
        height: 10px;
      }
      .bar-fill {
        background: #5b8cff;
        height: 100%;
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <h1>Recall — Skill Dashboard</h1>
    <div id="meta"></div>
    <div id="status">Loading…</div>
    <div id="bars"></div>
    <script type="module" src="dashboard.js"></script>
  </body>
</html>
